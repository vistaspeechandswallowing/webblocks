<!--
  Block:       Contact Form (HubSpot)
  Description: A clean contact card (Name, Email, Phone, Message) that sends every
               submission straight into your HubSpot CRM as a contact + form
               submission. No server, no API key — posts to HubSpot's public
               Forms API.
  Usage:       Paste everything below into a Squarespace Code Block.

  ============================================================================
  ONE-TIME SETUP — connect the form to HubSpot
  ============================================================================
  1. In HubSpot, go to  Marketing → Forms  and create (or open) a form.
     Give it fields for: First name, Email, Phone number, and a Message field
     (a single-line or multi-line text property such as the default "Message").
  2. Publish the form. You don't need to embed HubSpot's own code — this block
     posts to HubSpot directly.
  3. Find your two IDs:
       • Portal ID (a.k.a. Hub ID): top-right account menu, or Settings →
         Account Setup → Account Defaults. It's a number like 12345678.
       • Form GUID: open the form, click "Share" / "Embed", or read it from the
         URL while editing the form. It looks like:
             a1b2c3d4-1234-5678-9abc-def012345678
  4. Paste both into the CONFIG block in the <script> below
     (HUBSPOT_PORTAL_ID and HUBSPOT_FORM_GUID).
  5. Make sure each field's  name="..."  below matches the field's *internal
     name* in HubSpot (firstname, email, phone, message are HubSpot's defaults).
     If you renamed a property in HubSpot, update the matching name here.
  6. Publish the Squarespace page. Submissions appear under the form in HubSpot
     and create/update the contact in your CRM automatically.

  Note: this form is not configured for HIPAA/PHI. It collects a name, email,
  phone, and a short message only. Don't add sensitive health details to it.

  All styles are scoped under .wb-contact so nothing leaks into the rest of the page.
-->
<section class="wb-contact">
  <div class="wb-contact__inner">
    <p class="wb-contact__eyebrow">Get In Touch</p>
    <h2 class="wb-contact__title">Contact Us</h2>
    <p class="wb-contact__lead">Have a question or want to learn more? Send us a message and we’ll get back to you shortly.</p>

    <form class="wb-contact__form" novalidate>
      <div class="wb-contact__field">
        <label for="wb-contact-name">Name</label>
        <input id="wb-contact-name" type="text" name="firstname" placeholder="Your name" autocomplete="name" required>
      </div>
      <div class="wb-contact__row">
        <div class="wb-contact__field">
          <label for="wb-contact-email">Email</label>
          <input id="wb-contact-email" type="email" name="email" placeholder="you@example.com" autocomplete="email" required>
        </div>
        <div class="wb-contact__field">
          <label for="wb-contact-phone">Phone</label>
          <input id="wb-contact-phone" type="tel" name="phone" placeholder="(555) 555-5555" autocomplete="tel">
        </div>
      </div>
      <div class="wb-contact__field">
        <label for="wb-contact-message">Message</label>
        <textarea id="wb-contact-message" name="message" rows="4" placeholder="How can we help?" required></textarea>
      </div>

      <!-- Honeypot: bots fill this, humans can't see it → submission is dropped -->
      <input type="text" name="_gotcha" tabindex="-1" autocomplete="off" aria-hidden="true"
             style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0;">

      <button type="submit" class="wb-contact__submit">
        <span>Send Message</span>
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h12m0 0-5-5m5 5-5 5" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <p class="wb-contact__note" role="status" aria-live="polite"></p>
    </form>
  </div>
</section>

<style>
  .wb-contact {
    box-sizing: border-box;
    padding: clamp(1.75rem, 4vw, 3.5rem);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #1e293b;
  }
  .wb-contact *, .wb-contact *::before, .wb-contact *::after { box-sizing: border-box; }
  .wb-contact__inner {
    max-width: 640px;
    margin: 0 auto;
    background: #ffffff;
    border: 1px solid #e6ebf3;
    border-radius: 24px;
    padding: clamp(1.5rem, 4vw, 3rem);
    box-shadow: 0 18px 44px rgba(30, 64, 175, 0.08);
  }

  .wb-contact__eyebrow {
    margin: 0 0 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.78rem;
    font-weight: 600;
    color: #2563eb;
  }
  .wb-contact__title {
    margin: 0 0 0.75rem;
    font-size: clamp(1.7rem, 4vw, 2.5rem);
    line-height: 1.1;
    font-weight: 800;
    color: #0f172a;
  }
  .wb-contact__lead {
    margin: 0 0 1.75rem;
    font-size: clamp(1rem, 1.6vw, 1.1rem);
    line-height: 1.55;
    color: #475569;
  }

  .wb-contact__form { display: grid; gap: 1.1rem; margin: 0; }
  .wb-contact__row { display: grid; grid-template-columns: 1fr 1fr; gap: 1.1rem; }
  .wb-contact__field { display: grid; gap: 0.4rem; }
  .wb-contact__field label {
    font-size: 0.85rem;
    font-weight: 600;
    color: #334155;
  }

  .wb-contact input,
  .wb-contact textarea {
    box-sizing: border-box;
    width: 100%;
    padding: 0.85rem 1rem;
    font-size: 1rem;
    font-family: inherit;
    color: #0f172a;
    background: #f8fafc;
    border: 1px solid #d8e0ec;
    border-radius: 12px;
    outline: none;
    transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
  }
  .wb-contact textarea { resize: vertical; min-height: 110px; }
  .wb-contact input::placeholder,
  .wb-contact textarea::placeholder { color: #94a3b8; }
  .wb-contact input:focus,
  .wb-contact textarea:focus {
    border-color: #2563eb;
    background: #ffffff;
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
  }

  .wb-contact__submit {
    justify-self: start;
    display: inline-flex;
    align-items: center;
    gap: 0.85rem;
    margin-top: 0.35rem;
    padding: 0.55rem 0.55rem 0.55rem 1.6rem;
    font-size: 1.05rem;
    font-weight: 700;
    font-family: inherit;
    color: #ffffff;
    background: #2563eb;
    border: none;
    border-radius: 999px;
    cursor: pointer;
    transition: transform 0.12s ease, box-shadow 0.15s ease, background 0.15s;
    box-shadow: 0 10px 24px rgba(37, 99, 235, 0.24);
  }
  .wb-contact__submit:hover { transform: translateY(-1px); background: #1d4ed8; box-shadow: 0 14px 30px rgba(37, 99, 235, 0.3); }
  .wb-contact__submit:active { transform: translateY(0); }
  .wb-contact__submit:disabled { opacity: 0.65; cursor: default; transform: none; }
  .wb-contact__submit svg {
    flex: none;
    width: 40px;
    height: 40px;
    padding: 10px;
    box-sizing: border-box;
    color: #2563eb;
    background: #ffffff;
    border-radius: 50%;
  }

  .wb-contact__note { margin: 0.25rem 0 0; font-size: 0.9rem; min-height: 1.1em; color: #475569; }

  /* Stack on narrow screens (Squarespace mobile) */
  @media (max-width: 560px) {
    .wb-contact__row { grid-template-columns: 1fr; }
    .wb-contact__submit { justify-self: stretch; justify-content: center; }
  }
</style>

<script>
  (function () {
    // ── CONFIG ──────────────────────────────────────────────────────────────
    // Paste your HubSpot IDs here (see the setup notes at the top of this file).
    var HUBSPOT_PORTAL_ID = 'YOUR_PORTAL_ID';
    var HUBSPOT_FORM_GUID = 'YOUR_FORM_GUID';
    // ────────────────────────────────────────────────────────────────────────

    var forms = document.querySelectorAll('.wb-contact__form');
    Array.prototype.forEach.call(forms, function (form) {
      if (form.dataset.wbBound) return;
      form.dataset.wbBound = '1';
      var note = form.querySelector('.wb-contact__note');
      var button = form.querySelector('.wb-contact__submit');

      function setNote(msg) { if (note) note.textContent = msg; }

      form.addEventListener('submit', function (e) {
        e.preventDefault();

        // Honeypot — silently drop bot submissions.
        var gotcha = form.querySelector('[name="_gotcha"]');
        if (gotcha && gotcha.value) { form.reset(); setNote('Thanks! Your message has been sent.'); return; }

        // Require every field marked required.
        var missing = false;
        Array.prototype.forEach.call(form.querySelectorAll('[required]'), function (input) {
          if (!input.value.trim()) missing = true;
        });
        if (missing) { setNote('Please fill in your name, email, and message.'); return; }

        if (HUBSPOT_PORTAL_ID.indexOf('YOUR_') === 0 || HUBSPOT_FORM_GUID.indexOf('YOUR_') === 0) {
          setNote('This form isn’t connected yet — add your HubSpot Portal ID and Form GUID (see the setup notes in the code).');
          return;
        }

        // Build HubSpot's submission payload from the named fields.
        var fields = [];
        Array.prototype.forEach.call(form.querySelectorAll('input[name], textarea[name]'), function (input) {
          if (input.name === '_gotcha') return;
          if (!input.value.trim()) return;
          fields.push({ name: input.name, value: input.value.trim() });
        });

        var payload = {
          fields: fields,
          context: {
            pageUri: window.location.href,
            pageName: document.title
          }
        };

        var endpoint = 'https://api.hsforms.com/submissions/v3/integration/submit/' +
          encodeURIComponent(HUBSPOT_PORTAL_ID) + '/' + encodeURIComponent(HUBSPOT_FORM_GUID);

        button.disabled = true;
        setNote('Sending your message…');

        fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        }).then(function (response) {
          if (response.ok) {
            form.reset();
            setNote('Thanks! Your message has been sent — we’ll be in touch shortly.');
          } else {
            response.json().then(function (data) {
              var msg = (data && data.errors && data.errors.length && data.errors[0].message)
                ? data.errors[0].message
                : 'Something went wrong. Please try again or call us.';
              setNote(msg);
            }).catch(function () {
              setNote('Something went wrong. Please try again or call us.');
            });
          }
        }).catch(function () {
          setNote('Network error. Please check your connection and try again.');
        }).then(function () {
          button.disabled = false;
        });
      });
    });
  })();
</script>

<!--
  ── How this connects to HubSpot ────────────────────────────────────────────
  On submit, this block POSTs a JSON payload to HubSpot's public Forms
  Submissions API:
      https://api.hsforms.com/submissions/v3/integration/submit/{portalId}/{formGuid}
  Each visible field is sent as { name, value }, where "name" must match the
  field's internal name in your HubSpot form (firstname, email, phone, message
  by default). HubSpot creates or updates the contact and logs the submission —
  no API key or backend required. To collect different data, add/rename fields
  above and mirror the same internal names in your HubSpot form.
-->
