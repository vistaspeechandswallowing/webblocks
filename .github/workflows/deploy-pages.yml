name: Deploy gallery to GitHub Pages

# Publishes the repository (index.html, blocks.json, and the blocks/ folder) to
# GitHub Pages on every push to main, plus a manual "Run workflow" button.
#
# Requires a one-time setting: Settings -> Pages -> Build and deployment ->
# Source: "GitHub Actions". (This workflow does not try to enable Pages itself,
# which needs org permissions the Actions token doesn't have.)
on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token: read the repo, write to Pages, mint the deploy OIDC token.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so we can read each file's last-commit date

      - name: Generate last-updated dates
        run: |
          jq -r '.[].file' blocks.json | while read -r f; do
            d=$(git log -1 --format=%cI -- "$f")
            printf '{"file":%s,"updated":%s}\n' "$(jq -Rn --arg v "$f" '$v')" "$(jq -Rn --arg v "$d" '$v')"
          done | jq -s 'map({(.file): .updated}) | add' > updated.json
          cat updated.json

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
